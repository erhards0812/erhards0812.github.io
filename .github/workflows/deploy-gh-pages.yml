name: deploy company page
on:
  push:
    branches:
      - main # Change to "master" if your default branch uses that name

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: "recursive" # Ensures themes cloned as git submodules are pulled

      - name: Install Zola
        run: |
          sudo snap install --edge zola

      - name: Build Zola Site
        run: |
          zola build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public # Zola outputs compiled HTML/CSS to the 'public' folder

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write # Required to deploy to GitHub Pages
      id-token: write # Required for secure OIDC authentication
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
