baseURL = "https://shinyu-corp.com"
languageCode = "en-us"
title = "Shinyu株式会社"
theme = "hugo-digital-garden-theme"
copyright = "Shinyu株式会社"


[params]
name = "Hi There"
description = "Shinyu株式会社は、大規模Webアプリケーションのアーキテクチャ刷新、および低レイヤー・高並列処理を伴う高パフォーマンスなバックエンド構築に特化したテックエージェンシーです。私たちは、長年培った Ruby on Rails の広範な知見をベースに、Go や Rust を駆使した高スループットなマイクロサービスへの切り出し、技術的負債の解消、データベースを含めたシステム全体のボトルネック最適化を得意としています。単に要件定義通りのコードを書くベンダーではなく、ビジネスの成長速度にシステムが追いつかなくなる「技術的限界」を、圧倒的な実装力とアーキテクチャ設計で突破するパートナーであることを誇りに思っています。不確実性の高い技術課題に粘り強く立ち向かい、クライアントのプロダクト価値を極限まで高めるシステム基盤を提供し続けます。"
initials = "Shinyu株式会社"
googleAnalytics = ""

